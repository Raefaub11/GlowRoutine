<style>
  :root {
    --bg:        #CCDFC8;
    --surface:   #2D5228;
    --surface2:  #345E2E;
    --surface3:  #3A6634;
    --border:    rgba(180,200,160,0.13);
    --border2:   rgba(200,210,150,0.22);
    --sage:      #8FAF80;
    --sage-l:    #B8CFA8;
    --sage-dim:  #5A7D52;
    --gold:      #C9A84C;
    --gold-l:    #E8C96A;
    --gold-dim:  #7A6020;
    --text:      #E8EEE2;
    --text-mid:  #A8B89A;
    --text-dim:  #8AA882;
    --checked-line: #8FAF80;
    --acne-accent:  #9B8FD4;
    --gly-accent:   #8FAF80;
    --rec-accent:   #7FAABB;
    --full-accent:  #C99494;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 40px);
    padding-top: max(env(safe-area-inset-top), 24px);
    overflow-x: hidden;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* Gold top rule */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--sage), var(--gold), transparent);
    z-index: 100;
  }

  .wrap { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; }

  /* Header */
  .header {
    text-align: center;
    padding: 28px 0 24px;
  }

  .header-icon {
    width: 64px; height: 64px;
    border-radius: 16px;
    margin: 0 auto 14px;
    border: 1.5px solid var(--gold-dim);
    display: block;
    box-shadow: 0 4px 24px rgba(201,168,76,0.2);
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(30px, 7vw, 44px);
    font-weight: 500;
    letter-spacing: 0.5px;
    line-height: 1;
    color: #3A5C35;
  }

  .header h1 em {
    font-style: italic;
    color: var(--gold-l);
  }

  .header p {
    margin-top: 7px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* Day nav */
  .day-nav {
    display: flex;
    gap: 5px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .day-btn {
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .day-btn:hover { border-color: var(--sage-dim); color: var(--sage-l); }
  .day-btn.active {
    background: linear-gradient(135deg, var(--sage-dim), #3A5535);
    border-color: var(--sage);
    color: var(--sage-l);
    box-shadow: 0 2px 12px rgba(143,175,128,0.2);
  }

  /* Tab switcher */
  .tab-switcher {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 9px;
    background: transparent;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .tab-btn.active {
    background: linear-gradient(135deg, #2A3828, #1E2E1C);
    color: var(--sage-l);
    border: 1px solid var(--border2);
  }

  /* Section divider */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 8px 0 12px;
    font-weight: 400;
  }
  .section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
  }

  /* Routine block */
  .routine-block {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 14px;
    transition: border-color 0.3s;
  }

  .routine-block:has(.step-item.checked) {
    border-color: rgba(143,175,128,0.2);
  }

  .block-header {
    padding: 13px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .block-header.morning  { background: linear-gradient(135deg, #2A4226, #304A2C); }
  .block-header.night-a  { background: linear-gradient(135deg, #2E2A40, #2A2836); }
  .block-header.night-b  { background: linear-gradient(135deg, #263C2A, #2A4030); }
  .block-header.night-c  { background: linear-gradient(135deg, #243440, #283A44); }
  .block-header.night-d  { background: linear-gradient(135deg, #402A2A, #382828); }
  .block-header.hair-daily     { background: linear-gradient(135deg, #3A3018, #40361C); }
  .block-header.hair-treatment { background: linear-gradient(135deg, #302840, #38303C); }

  .block-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .block-subtitle {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .block-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge-morning  { background: rgba(143,175,128,0.15); color: var(--sage-l); border: 1px solid rgba(143,175,128,0.25); }
  .badge-acne     { background: rgba(155,143,212,0.15); color: #B8AEE8; border: 1px solid rgba(155,143,212,0.25); }
  .badge-gly      { background: rgba(143,175,128,0.2);  color: var(--sage-l); border: 1px solid rgba(143,175,128,0.3); }
  .badge-rec      { background: rgba(127,170,187,0.15); color: #A8CCE0; border: 1px solid rgba(127,170,187,0.25); }
  .badge-full     { background: rgba(201,148,148,0.15); color: #E0B0B0; border: 1px solid rgba(201,148,148,0.25); }
  .badge-daily    { background: rgba(201,168,76,0.15);  color: var(--gold-l); border: 1px solid rgba(201,168,76,0.25); }
  .badge-treat    { background: rgba(155,130,200,0.15); color: #C0AEE8; border: 1px solid rgba(155,130,200,0.25); }

  /* Steps */
  .step-list { padding: 4px 0; }

  .step-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 16px;
    border-bottom: 1px solid rgba(180,200,160,0.05);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .step-item:last-child { border-bottom: none; }
  .step-item:hover { background: var(--surface2); }
  .step-item.checked { background: rgba(143,175,128,0.04); }

  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface3);
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.25s;
  }

  .step-item.checked .step-num {
    background: var(--sage-dim);
    border-color: var(--sage);
    color: var(--sage-l);
  }

  .step-item.checked .step-num::after { content: "✓"; font-size: 11px; }
  .step-item.checked .step-num span { display: none; }

  .step-body { flex: 1; }

  .step-name {
    font-size: 13px; font-weight: 500;
    color: var(--text);
    transition: color 0.2s;
    line-height: 1.3;
  }

  .step-item.checked .step-name {
    color: var(--text-dim);
    text-decoration: line-through;
    text-decoration-color: var(--sage-dim);
  }

  .step-product {
    font-size: 11px; color: var(--text-mid);
    margin-top: 2px; font-weight: 300;
  }

  .step-tip {
    font-size: 10px; color: var(--gold);
    margin-top: 3px; font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
  }

  /* Warning */
  .warn-banner {
    margin: 0 16px 12px;
    padding: 8px 12px;
    background: rgba(201,168,76,0.08);
    border-left: 2px solid var(--gold-dim);
    border-radius: 0 8px 8px 0;
    font-size: 11px;
    color: var(--gold);
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  /* Progress */
  .progress-wrap {
    padding: 12px 16px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--text-dim);
    margin-bottom: 7px; font-weight: 500;
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  .progress-bar {
    height: 3px;
    background: var(--surface3);
    border-radius: 10px; overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage-dim), var(--gold));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .reset-btn {
    display: flex; align-items: center; gap: 5px;
    margin: 10px auto 0;
    padding: 5px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: 'Jost', sans-serif;
    font-size: 10px; color: var(--text-dim);
    cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .reset-btn:hover { border-color: var(--sage-dim); color: var(--sage-l); }

  .night-label {
    text-align: center;
    font-size: 12px; color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 300; letter-spacing: 0.3px;
  }
  .night-label strong { color: var(--text); font-weight: 500; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Animate in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .routine-block { animation: fadeUp 0.3s ease both; }
  .routine-block:nth-child(2) { animation-delay: 0.05s; }
  .routine-block:nth-child(3) { animation-delay: 0.10s; }
</style>
</head>

  morning: [

    { name:'Peptide Serum',  product:'The Ordinary Buffet (optional)',      tip:'Nice to have — not the star tonight' },

const HAIR_DAILY_STEPS = [
  { name:'Multi-Peptide Serum', product:'The Ordinary Multi-Peptide Serum for Hair Density', tip:'Directly to scalp — focus edges + thinning areas. Massage 1–2 min.' },
];

let currentDay = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
let currentTab = 'face';
let checked = {};

function stateKey(day, blockId, stepIdx) { return `${day}__${blockId}__${stepIdx}`; }
function isChecked(day, blockId, stepIdx) { return !!checked[stateKey(day, blockId, stepIdx)]; }

function toggleCheck(day, blockId, stepIdx) {
  const k = stateKey(day, blockId, stepIdx);
  checked[k] = !checked[k];
  renderAll();
}

function resetBlock(day, blockId) {
  Object.keys(checked).forEach(k => { if (k.startsWith(`${day}__${blockId}__`)) delete checked[k]; });
  renderAll();
}

function buildDayNav() {
  document.getElementById('dayNav').innerHTML = DAYS.map(d =>
    `<button class="day-btn ${d===currentDay?'active':''}" onclick="selectDay('${d}')">${d}</button>`
  ).join('');
}

function selectDay(day) { currentDay = day; buildDayNav(); renderAll(); }

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('faceContent').classList.toggle('active', tab==='face');
  document.getElementById('hairContent').classList.toggle('active', tab==='hair');
  document.getElementById('faceTab').classList.toggle('active', tab==='face');
  document.getElementById('hairTab').classList.toggle('active', tab==='hair');
}

function renderSteps(containerId, steps, blockId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = steps.map((s, i) => {
    const done = isChecked(currentDay, blockId, i);
    return `<div class="step-item ${done?'checked':''}" onclick="toggleCheck('${currentDay}','${blockId}',${i})">
      <div class="step-num">${done ? '' : `<span>${i+1}</span>`}</div>
      <div class="step-body">
        <div class="step-name">${s.name}</div>
        <div class="step-product">${s.product}</div>
        ${s.tip ? `<div class="step-tip">${s.tip}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderProgress(progId, fillId, steps, blockId) {
  const total = steps.length;
  const done = steps.filter((_,i) => isChecked(currentDay, blockId, i)).length;
  const pEl = document.getElementById(progId);
  const fEl = document.getElementById(fillId);
  if (pEl) pEl.textContent = `${done} / ${total}`;
  if (fEl) fEl.style.width = `${(done/total)*100}%`;
}

function renderMorning() {
  renderSteps('steps-morning', FACE_STEPS.morning, 'morning');
  renderProgress('prog-morning', 'fill-morning', FACE_STEPS.morning, 'morning');
  const rb = document.getElementById('reset-morning');
  if (rb) rb.onclick = () => resetBlock(currentDay, 'morning');
}

function renderNightBlock() {
  const night = NIGHT_TYPES[currentDay];
  const steps = FACE_STEPS[night.type];
  const blockId = 'night';
  document.getElementById('nightLabel').innerHTML =
    `Tonight is <strong>${FULL_DAYS[DAYS.indexOf(currentDay)]}</strong> — ${night.desc}`;
  const warn = night.type==='exfol'
    ? '<div class="warn-banner">⚠ Glycolic night — do NOT combine with salicylic tonight.</div>'
    : night.type==='full_recovery'
    ? '<div class="warn-banner">◌ Full recovery — bare minimum only. Let your skin breathe.</div>'
    : '';
  document.getElementById('nightBlock').innerHTML = `
    <div class="routine-block">
      <div class="block-header ${night.header}">
        <div>
          <div class="block-title">${night.label}</div>
          <div class="block-subtitle">${night.desc}</div>
        </div>
        <span class="block-badge ${night.badge}">${FULL_DAYS[DAYS.indexOf(currentDay)].slice(0,3)}</span>
      </div>
      ${warn}
      <div class="step-list" id="steps-night"></div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Progress</span><span id="prog-night">0/${steps.length}</span></div>
        <div class="progress-bar"><div class="progress-fill" id="fill-night" style="width:0%"></div></div>
        <button class="reset-btn" onclick="resetBlock('${currentDay}','night')">↺ Reset night</button>
      </div>
    </div>`;
  renderSteps('steps-night', steps, blockId);
  renderProgress('prog-night', 'fill-night', steps, blockId);
}

function renderHairDaily() {
  renderSteps('steps-hair-daily', HAIR_DAILY_STEPS, 'hair-daily');
  renderProgress('prog-hair-daily', 'fill-hair-daily', HAIR_DAILY_STEPS, 'hair-daily');
  const rb = document.getElementById('reset-hair-daily');
  if (rb) rb.onclick = () => resetBlock(currentDay, 'hair-daily');
}

function renderHairExtra() {
  const extra = HAIR_EXTRA[currentDay];
  const container = document.getElementById('hairExtraBlock');
  if (!extra) {
    container.innerHTML = `<div class="routine-block"><div class="block-header hair-daily">
      <div><div class="block-title">Peptides Only Tonight</div><div class="block-subtitle">Rest day — no extra oils</div></div>
      <span class="block-badge badge-daily">Rest</span></div>
      <div style="padding:14px 16px;font-size:12px;color:var(--text-dim);">Just the daily serum tonight. Consistency is the move.</div></div>`;
    return;
  }
  const isTreat = currentDay==='Sat';
  container.innerHTML = `<div class="routine-block">
    <div class="block-header ${isTreat?'hair-treatment':'hair-daily'}">
      <div><div class="block-title">${isTreat?'Treatment Night':'Seal + Protect'}</div>
      <div class="block-subtitle">${isTreat?'Heavy JBCO — thickness move':'Light oil after your serum'}</div></div>
      <span class="block-badge ${isTreat?'badge-treat':'badge-daily'}">${isTreat?'Treat':'Oil'}</span>
    </div>
    <div class="step-list" id="steps-hair-extra"></div>
    <div class="progress-wrap">
      <div class="progress-label"><span>Progress</span><span id="prog-hair-extra">0/${extra.length}</span></div>
      <div class="progress-bar"><div class="progress-fill" id="fill-hair-extra" style="width:0%"></div></div>
      <button class="reset-btn" onclick="resetBlock('${currentDay}','hair-extra')">↺ Reset</button>
    </div></div>`;
  renderSteps('steps-hair-extra', extra, 'hair-extra');
  renderProgress('prog-hair-extra', 'fill-hair-extra', extra, 'hair-extra');
}

function renderAll() {
  renderMorning();
  renderNightBlock();
  renderHairDaily();
  renderHairExtra();
}

buildDayNav();
renderAll();
</script>
</body>
</html>
